<div class="relative min-h-screen overflow-hidden flex flex-col bg-[#0a1628]">

  <!-- Fondo SVG blob azul -->
  <div class="absolute inset-0 z-0 pointer-events-none">
    <svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice"
         xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
      <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1"/>
          <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1"/>
        </linearGradient>
        <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.7"/>
          <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.3"/>
        </linearGradient>
      </defs>
      <!-- Blob izquierdo grande -->
      <path d="M0,0 L700,0 Q900,250 700,500 Q500,750 750,900 L0,900 Z" fill="url(#g1)" opacity="0.9"/>
      <!-- Círculos decorativos -->
      <circle cx="300" cy="400" r="280" fill="white" opacity="0.03"/>
      <circle cx="200" cy="500" r="180" fill="white" opacity="0.04"/>
      <circle cx="500" cy="150" r="120" fill="white" opacity="0.03"/>
      <!-- Blob derecho inferior -->
      <path d="M1440,900 L850,900 Q720,680 950,550 Q1180,420 1440,620 Z" fill="url(#g2)" opacity="0.6"/>
      <!-- Blob superior derecho -->
      <path d="M1440,0 L1100,0 Q1200,200 1440,300 Z" fill="url(#g1)" opacity="0.4"/>
    </svg>
  </div>

  <!-- Partículas / destellos decorativos -->
  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute top-20 right-32 w-1 h-1 bg-blue-300 rounded-full opacity-60"></div>
    <div class="absolute top-40 right-64 w-1.5 h-1.5 bg-blue-200 rounded-full opacity-40"></div>
    <div class="absolute top-60 right-20 w-1 h-1 bg-white rounded-full opacity-30"></div>
    <div class="absolute bottom-40 right-48 w-2 h-2 bg-blue-400 rounded-full opacity-30"></div>
    <div class="absolute bottom-20 right-20 w-1 h-1 bg-white rounded-full opacity-50"></div>
    <div class="absolute top-1/3 right-1/3 w-1 h-1 bg-blue-300 rounded-full opacity-40"></div>
  </div>

  <!-- Navbar -->
  <nav class="relative z-10 flex items-center justify-between px-6 sm:px-12 py-5">
    <div class="flex items-center gap-3">
      <img src="assets/logo-capeletti.png" alt="Logo"
           class="h-8 w-8 object-contain"
           onerror="this.style.display='none'"/>
      <span class="text-white font-bold text-sm sm:text-base tracking-widest uppercase">
        Capeletti
        <span class="text-blue-300 font-light">Abogados</span>
      </span>
    </div>
    <button (click)="irLogin()"
      class="text-white text-sm font-medium px-5 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition backdrop-blur-sm">
      Iniciar sesión
    </button>
  </nav>

  <!-- Hero -->
  <div class="relative z-10 flex-1 flex flex-col items-center justify-center px-6 sm:px-12 text-center py-16">

    <!-- Badge -->
    <div class="inline-flex items-center gap-2 bg-blue-500/20 border border-blue-400/30 text-blue-200 text-xs font-semibold px-4 py-2 rounded-full mb-8 backdrop-blur-sm">
      <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
      Sistema de Gestión Interno
    </div>

    <!-- Título principal -->
    <h1 class="text-4xl sm:text-6xl lg:text-7xl font-black text-white mb-6 leading-tight tracking-tight">
      Especialistas en
      <br/>
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-300 to-blue-500">
        Accidentes Laborales
      </span>
    </h1>

    <!-- Subtítulo -->
    <p class="text-blue-200/80 text-base sm:text-lg max-w-xl mb-12 leading-relaxed">
      Plataforma interna de gestión de casos, seguimiento de llamadores
      y administración de expedientes.
    </p>

    <!-- CTA principal -->
    <div class="flex flex-col sm:flex-row items-center gap-4">
      <button (click)="irLogin()"
        class="group flex items-center gap-3 bg-white text-blue-900 font-bold text-base px-8 py-4 rounded-2xl shadow-2xl hover:shadow-blue-500/30 hover:scale-[1.03] transition-all duration-200">
        <svg class="w-5 h-5 text-blue-700 group-hover:translate-x-0.5 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l3 3m0 0l-3 3m3-3H3"/>
        </svg>
        Ingresar al sistema
      </button>
    </div>

    <!-- Separador / estadísticas visuales -->
    <div class="mt-20 grid grid-cols-3 gap-6 sm:gap-12 max-w-lg">
      <div class="flex flex-col items-center gap-1">
        <span class="text-3xl sm:text-4xl font-black text-white">⚖</span>
        <span class="text-xs text-blue-300/70 uppercase tracking-wider font-medium">Expedientes</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <span class="text-3xl sm:text-4xl font-black text-white">📋</span>
        <span class="text-xs text-blue-300/70 uppercase tracking-wider font-medium">Casos</span>
      </div>
      <div class="flex flex-col items-center gap-1">
        <span class="text-3xl sm:text-4xl font-black text-white">📱</span>
        <span class="text-xs text-blue-300/70 uppercase tracking-wider font-medium">Llamadores</span>
      </div>
    </div>

  </div>

  <!-- Footer mínimo -->
  <div class="relative z-10 text-center pb-6">
    <p class="text-blue-300/40 text-xs tracking-wider">
      © {{ year }} Capeletti Abogados · Todos los derechos reservados
    </p>
  </div>

</div>
